<!DOCTYPE html>
<html>
<head>
    <title>Web Chat Client</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
</head>
<body style="font-family: sans-serif; padding: 20px;">
<h2>Web Client (User 2)</h2>
<div id="messages" style="border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px;"></div>
<input id="input" type="text" placeholder="Type a message..." style="padding: 10px; width: 70%;">
<button onclick="sendMessage()" style="padding: 10px;">Send</button>

<script>
        // Connect to your Python Server
        const socket = io('http://localhost:5000');

        socket.on('connect', () => console.log("Connected to server"));

        socket.on('receive_message', (data) => {
            const div = document.createElement('div');
            // If it's my message or someone else's
            div.style.textAlign = data.sender === 'WebUser' ? 'right' : 'left';
            div.style.color = data.sender === 'WebUser' ? 'blue' : 'black';
            div.innerText = `${data.sender}: ${data.text}`;
            document.getElementById('messages').appendChild(div);
        });

        function sendMessage() {
            const input = document.getElementById('input');
            const text = input.value;
            if(text) {
                socket.emit('send_message', {
                    text: text,
                    sender: 'WebUser',
                    time: new Date().toISOString()
                });
                input.value = '';
            }
        }
    </script>
</body>
</html>
